name: Scrape Google Maps (Tehran using scraper grid-bbox) → Release

on:
  workflow_dispatch:

jobs:
  scrape-and-release:
    runs-on: ubuntu-latest
    env:
      # Tehran bounding box (minLat,minLng,maxLat,maxLng)
      BBOX: "35.50,51.20,35.90,51.70"
      OUT_NAME: "tehran-places-$(date +%Y%m%d-%H%M%S).json"
    steps:
      - name: Checkout workflow repo
        uses: actions/checkout@v4

      - name: Checkout google-maps-scraper
        uses: actions/checkout@v4
        with:
          repository: gosom/google-maps-scraper
          path: google-maps-scraper

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.21"

      - name: Build scraper
        working-directory: google-maps-scraper
        run: |
          go mod download
          go build -o gmscraper ./cmd || go build -o gmscraper .

      - name: Run scraper using built-in grid-bbox
        working-directory: google-maps-scraper
        env:
          BBOX: ${{ env.BBOX }}
          ROWS: ${{ env.GRID_ROWS }}
          COLS: ${{ env.GRID_COLS }}
          OUT: ${{ env.OUT_NAME }}
        run: |
          set -euo pipefail
          echo "Running scraper with grid-bbox=${BBOX}, rows=${ROWS}, cols=${COLS}"
          ./gmscraper --grid-bbox "${BBOX}" --depth 10 --grid-cell 1.0 --email --extra-reviews --zoom 19 --format json --output "../${OUT}" || (echo "Scraper failed" && exit 1)

      - name: Create GitHub release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: tehran-scrape-${{ github.run_id }}-${{ github.run_number }}
          release_name: "Tehran scrape ${{ github.run_id }} #${{ github.run_number }}"
          body: Automated scrape of Google Maps places for Tehran using scraper's grid-bbox.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload scrape asset to release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./${{ env.OUT_NAME }}
          asset_name: ${{ env.OUT_NAME }}
          asset_content_type: application/json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
