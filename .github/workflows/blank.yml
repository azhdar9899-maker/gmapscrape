name: Scrape Google Maps (Tehran, batched grid) → Release

on:
  workflow_dispatch:
    inputs:
      bbox:
        description: "Bounding box: minLat,minLng,maxLat,maxLng"
        default: "35.50,51.20,35.90,51.70"
      tile_deg:
        description: "Tile size in degrees (smaller = more, shorter jobs)"
        default: "0.10"
      depth:
        description: "Max scroll depth per cell"
        default: "10"
      grid_cell:
        description: "Grid cell size in km"
        default: "1.0"
      zoom:
        description: "Zoom level (0-21)"
        default: "19"
      max_minutes:
        description: "Per-tile time budget; scraper is gracefully stopped after this so partial data is still uploaded"
        default: "300"

permissions:
  contents: write

jobs:
  # 1) Split the bbox into small tiles -> a matrix of sub-jobs.
  plan:
    runs-on: ubuntu-latest
    outputs:
      tiles: ${{ steps.tiles.outputs.tiles }}
    steps:
      - name: Compute tiles
        id: tiles
        env:
          BBOX: ${{ github.event.inputs.bbox }}
          TILE_DEG: ${{ github.event.inputs.tile_deg }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json, os
          min_lat, min_lng, max_lat, max_lng = map(float, os.environ["BBOX"].split(","))
          tile = float(os.environ["TILE_DEG"])
          eps = 1e-9
          tiles, r, lat = [], 0, min_lat
          while lat < max_lat - eps:
              lat2 = min(lat + tile, max_lat)
              c, lng = 0, min_lng
              while lng < max_lng - eps:
                  lng2 = min(lng + tile, max_lng)
                  tiles.append({
                      "id": f"r{r}c{c}",
                      "bbox": f"{lat:.4f},{lng:.4f},{lat2:.4f},{lng2:.4f}",
                  })
                  lng, c = lng2, c + 1
              lat, r = lat2, r + 1
          if len(tiles) > 256:
              raise SystemExit(f"{len(tiles)} tiles exceeds GitHub's 256-job matrix limit; increase tile_deg")
          print("tiles=" + json.dumps(tiles))
          print(f"Generated {len(tiles)} tiles", file=__import__("sys").stderr)
          PY

  # 2) One short job per tile, all running in parallel.
  scrape:
    needs: plan
    runs-on: ubuntu-latest
    # Job backstop kept above the per-step budget; the scraper is stopped
    # gracefully well before this via coreutils `timeout` in the run step.
    timeout-minutes: 350
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        tile: ${{ fromJson(needs.plan.outputs.tiles) }}
    steps:
      - name: Checkout google-maps-scraper
        uses: actions/checkout@v4
        with:
          repository: gosom/google-maps-scraper
          path: google-maps-scraper

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache-dependency-path: google-maps-scraper/go.sum

      - name: Build scraper
        working-directory: google-maps-scraper
        run: |
          go mod download
          go build -o gmscraper ./cmd || go build -o gmscraper .

      - name: Run scraper for tile ${{ matrix.tile.id }}
        working-directory: google-maps-scraper
        # Step-level timeout: if a step times out only THIS step fails, so the
        # `if: always()` upload below still runs (a job timeout would cancel
        # everything). Kept just above the in-step coreutils budget.
        timeout-minutes: 330
        env:
          TILE_BBOX: ${{ matrix.tile.bbox }}
          DEPTH: ${{ github.event.inputs.depth }}
          GRID_CELL: ${{ github.event.inputs.grid_cell }}
          ZOOM: ${{ github.event.inputs.zoom }}
          MAX_MINUTES: ${{ github.event.inputs.max_minutes }}
          OUT: tehran-${{ matrix.tile.id }}.csv
        run: |
          set -uo pipefail
          echo "Scraping tile ${{ matrix.tile.id }} bbox=${TILE_BBOX} (budget ${MAX_MINUTES}m)"
          # The scraper flushes each result to the CSV as it is scraped, and
          # flushes/closes cleanly on SIGTERM. `timeout` sends SIGTERM at the
          # budget (then SIGKILL 90s later if it ignores), so partial data is
          # preserved and written even when the tile can't finish in time.
          status=0
          timeout --signal=SIGTERM --kill-after=90s "${MAX_MINUTES}m" \
            ./gmscraper \
              --grid-bbox "${TILE_BBOX}" \
              --grid-cell "${GRID_CELL}" \
              --depth "${DEPTH}" \
              --zoom "${ZOOM}" \
              --email \
              --extra-reviews \
              --exit-on-inactivity 5m \
              --results "../${OUT}" || status=$?
          # 124 = hit the time budget (expected); 143 = terminated by SIGTERM.
          # Treat those as success so the partial CSV still uploads.
          if [ "$status" -eq 124 ] || [ "$status" -eq 143 ]; then
            echo "Tile ${{ matrix.tile.id }} stopped at time budget; keeping partial results."
          elif [ "$status" -ne 0 ]; then
            echo "Scraper exited with status $status" >&2
            exit "$status"
          fi
          # Guarantee the artifact exists even if the tile had zero results.
          touch "../${OUT}"
          echo "Rows in ${OUT}: $(( $(wc -l < "../${OUT}") ))"

      - name: Upload tile result
        # Always upload — even if the scrape step failed or was force-stopped,
        # whatever was flushed to disk is captured.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tile-${{ matrix.tile.id }}
          path: tehran-${{ matrix.tile.id }}.csv
          retention-days: 7
          if-no-files-found: warn

  # 3) Merge every tile CSV into one file and publish a single release.
  release:
    needs: scrape
    if: ${{ always() && needs.scrape.result != 'cancelled' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download all tile results
        uses: actions/download-artifact@v4
        with:
          path: tiles
          pattern: tile-*
          merge-multiple: true

      - name: Merge CSVs
        id: merge
        run: |
          set -euo pipefail
          stamp="$(date +%Y%m%d-%H%M%S)"
          out="tehran-places-${stamp}.csv"
          shopt -s nullglob
          files=(tiles/*.csv)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No tile CSVs were produced." >&2
            exit 1
          fi
          # Keep the header from the first non-empty file, append data rows from the rest.
          header_written=0
          for f in "${files[@]}"; do
            [ -s "$f" ] || continue
            if [ "$header_written" -eq 0 ]; then
              cat "$f" > "$out"
              header_written=1
            else
              tail -n +2 "$f" >> "$out"
            fi
          done
          [ -s "$out" ] || { echo "All tiles empty." >&2; exit 1; }
          rows=$(( $(wc -l < "$out") - 1 ))
          echo "Merged ${#files[@]} files, ${rows} data rows -> ${out}"
          echo "out_name=${out}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: tehran-scrape-${{ github.run_id }}-${{ github.run_number }}
          name: "Tehran scrape ${{ github.run_id }} #${{ github.run_number }}"
          body: |
            Automated batched scrape of Google Maps places for Tehran.
            bbox=${{ github.event.inputs.bbox }} tile_deg=${{ github.event.inputs.tile_deg }}
          files: ${{ steps.merge.outputs.out_name }}
